[context]
name        = "personal:writer"
description = "Blog posts, threads, newsletters — capture to draft to publish"
domain      = "personal"
private     = false

[persona]
agent         = ""   # no persona; voice is Panda's own
voice_override = ""

[flow]
main = "writing"
side = ["retro"]

[skills]
public = [
  "pandastack:content-write",   # structure coach + slop detection (3-layer)
  "pandastack:write-ship",      # Close → Extract → Backflow for published pieces
  "pandastack:grill",           # adversarial mode to stress-test thesis before committing
  "pandastack:tool-web-extract", # pull reference URLs into clean markdown
  "pandastack:tool-bird",       # read/draft X threads
  "pandastack:tool-summarize",  # summarize source material
  "pandastack:think-like-naval", # framing / mental models check
  "pandastack:think-like-alan-chan", # product / builder narrative lens
  "pandastack:retro-week",
  "pandastack:retro-month",
  "pandastack:done",
]
private = []

[memory]
namespace    = "personal/writer"
firewall_from = ["work/yei/*", "work/sommet/*"]

[sources]
vault = "personal-vault"

[knowledge]
# qmd collection allow/forbid for Layer 4 source firewall.
# allow = pdctx query auto-expands to these collections when -c is omitted.
# forbid = pdctx query rejects -c against any of these.
allow  = ["knowledge", "blog", "lennys", "sessions"]
forbid = ["work-vault"]

[gbrain]
# Phase 1 placeholder — adapter registered, contexts declared, gbrain not yet primary.
# Phase 2 toggle (gbq through pdctx instead of direct) is a separate cut.
allow      = ["panda-vault"]
forbid     = []
write_mode = "read-only"

[mcp]
# Layer 5 firewall: tool-name glob patterns blocked at PreToolUse hook time.
# v0 = denylist only (allow/classifier/JIT deferred; see grill 2026-04-30).
deny = [
  "mcp__claude_ai_Linear__*",     # Sommet ticketing — work-sommet only
  "mcp__claude_ai_Atlassian__*",  # Yei ticketing (Jira) — work-yei only
]

[notes]
# grill in adversarial (default) mode is the thesis stress-tester; run before content-write structure stage to catch weak arguments early.
# write-ship handles the full publish loop including mv to Blog/Published/, reverse-citations, and X-thread draft routing to Inbox/x-drafts/.
# No persona is intentional; content-write's slop detection is the quality gate, not a persona filter.
