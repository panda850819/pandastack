[context]
name        = "work:yei:ops"
description = "Yei Finance operations: alerts, protocol ops, Ops Manager daily execution"
domain      = "work:yei"
private     = true

[persona]
agent         = "pandastack:ops"
voice_override = "ops-manager"

[flow]
main = "work"
side = ["retro"]

[skills]
public = [
  "pandastack:tool-notion",   # Yei HQ 9 active DBs, projects, SOPs
  "pandastack:tool-slack",    # Yei Slack: alerts, team comms, DMs
  "pandastack:work-ship",     # Close → Extract → Backflow for Yei work topics
  "pandastack:grill",         # adversarial scope lock before executing ambiguous asks
  "pandastack:done",
  "pandastack:retro-week",
  "pandastack:retro-month",
]
private = [
  "pandastack-private:misalignment",      # weekly Slack misalignment detection
  "pandastack-private:yei-alert-triage",  # protocol risk event triage + impact assessment
]

[memory]
namespace    = "work/yei/ops"
firewall_from = ["personal/*", "work/sommet/*", "work/yei/finance", "work/yei/hr"]

[sources]
vault            = "work-vault"
notion_workspace = "yei-finance"

[notes]
# P0 interrupt rule: Bob (CEO) + any protocol risk → always interrupt Panda regardless of active flow.
# Vault-only writes by default; external Notion/Jira mutations go through ship-proposal + /process-decisions.
# misalignment is weekly cadence (Mondays); yei-alert-triage triggers on P0/P1 protocol events from Slack.
