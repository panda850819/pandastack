[context]
name        = "work:yei:hr"
description = "Yei Finance HR: hiring pipeline, onboarding, payroll, team health"
domain      = "work:yei"
private     = true

[persona]
agent         = "pandastack:ops"
voice_override = "ops-manager"

[flow]
main = "work"
side = ["retro"]

[skills]
public = [
  "pandastack:tool-notion",   # People Ops Board, hiring DB, onboarding checklists
  "pandastack:tool-slack",    # #people-ops, candidate threads, team announcements
  "pandastack:work-ship",     # Close → Extract → Backflow for HR decisions
  "pandastack:grill",         # structured mode for interview prep / JD scoping
  "pandastack:done",
  "pandastack:retro-week",
  "pandastack:retro-month",
]
private = []

[memory]
namespace    = "work/yei/hr"
firewall_from = ["personal/*", "work/sommet/*", "work/yei/ops", "work/yei/finance"]

[sources]
vault            = "work-vault"
notion_workspace = "yei-finance"

[notes]
# P0 interrupt: candidate decision deadline or payroll date approaching (<24h).
# HR memory is isolated from ops and finance even within work:yei to prevent inadvertent salary/budget cross-contamination.
# Draft-and-ask mode for any external messages (Slack to candidates, offer letters); never auto-send.
