[context]
name        = "personal:developer"
description = "Personal software development work: features, debugging, refactors, side projects"
domain      = "personal"
private     = false

[persona]
agent         = "pandastack:eng"
voice_override = ""

[flow]
main = "dev"
side = ["retro"]

[skills]
public = [
  "pandastack:grill",           # --mode structured for requirement lock
  "pandastack:careful",         # production / shared infra gate
  "pandastack:qa",              # browser-based UI verification
  "pandastack:review",          # 3-pass + Codex cross-check
  "pandastack:ship",            # commit + push + PR
  "pandastack:checkpoint",      # save/resume working state
  "pandastack:freeze",          # lock editing scope before ship
  "pandastack:deep-research",   # prior art / library research
  "pandastack:tool-deepwiki",   # GitHub repo docs
  "pandastack:tool-bird",       # X/Twitter read for ecosystem signal
  "pandastack:tool-notion",     # Notion read (project context)
  "pandastack:tool-railway",    # Railway deploys / logs
  "pandastack:tool-summarize",  # summarize docs / changelogs
  "pandastack:tool-pdf",        # spec / RFC reading
  "pandastack:retro-week",
  "pandastack:retro-month",
  "pandastack:done",
]
private = []

[memory]
namespace    = "personal/developer"
firewall_from = ["work/yei/*", "work/sommet/*"]

[sources]
vault = "personal-vault"

[gbrain]
allow      = ["panda-vault"]
forbid     = []
write_mode = "read-only"

[mcp]
deny = [
  "mcp__claude_ai_Linear__*",     # Sommet ticketing — work-sommet only
  "mcp__claude_ai_Atlassian__*",  # Yei ticketing (Jira) — work-yei only
]

[notes]
# grill --mode structured replaces brief (A4 consolidation); use /grill --mode structured to lock requirements before plan.
# pandastack:review is the default review; security-review --mode agent handles security-focused passes separately.
# tool-railway and tool-notion are informational reads only in this context; writes go through ship-proposal + /process-decisions.
