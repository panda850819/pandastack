[context]
name        = "work:sommet:abyss-po"
description = "Sommet Labs / Abyss Trade product owner: dry-run execution, roadmap, PO decisions"
domain      = "work:sommet"
private     = true

[persona]
agent         = "pandastack:product"
voice_override = ""

[flow]
main = "work"
side = ["retro"]

[skills]
public = [
  "pandastack:work-ship",         # Close → Extract → Backflow for Abyss PO decisions
  "pandastack:persona-pipeline",  # sequential multi-lens review for large feature decisions
  "pandastack:grill",             # structured mode for PO requirement lock
  "pandastack:tool-notion",       # Abyss playbook, project tracking in Notion
  "pandastack:tool-slack",        # Sommet Slack: crew handles (Bob/Guido/Johnny/Sushant/Arthur)
  "pandastack:done",
  "pandastack:retro-week",
  "pandastack:retro-month",
]
private = [
  "pandastack-private:sommet:abyss-dry-run-init",  # start-of-day state snapshot for Phase 1
  "pandastack-private:sommet:abyss-dry-run-step",  # execute one playbook action + log
]

[memory]
namespace    = "work/sommet/abyss-po"
firewall_from = ["personal/*", "work/yei/*"]

[sources]
vault       = "work-vault"
linear_team = "ABYSS"

[notes]
# Phase 1 = dry run (no real $); abyss-dry-run-init + step are the daily execution primitives for this phase.
# Playbook canonical location: Notion 34a88c20-674a-80a1-b3c6-eee61a4284af (read via tool-notion).
# Yei firewall is strict: Abyss/Sommet strategy must not bleed into Yei context and vice versa per NDA boundary.
